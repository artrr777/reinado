<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Reinado - Betim MG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { dark: '#111827', gold: '#D97706', light: '#F9FAFB' } } } };
    </script>
    <style>
        body.fonte-ampliada { font-size: 112.5%; }
        body.alto-contraste,
        body.alto-contraste :where(header, footer, section, div, form, table, thead, tbody, tr, .bg-white, .bg-light, .bg-gray-50, .bg-gray-100, .bg-dark, .bg-amber-50) {
            background-color: #000 !important;
            color: #fff !important;
            border-color: #fff !important;
        }
        body.alto-contraste :where(.text-dark, .text-gray-400, .text-gray-500, .text-gray-600, .text-gray-700, .text-gray-800, .text-gray-900, .text-white) { color: #fff !important; }
        body.alto-contraste :where(a, button) { color: #ff0 !important; }
        body.alto-contraste :where(a, button):hover { color: #000 !important; background-color: #ff0 !important; }
        body.alto-contraste :where(input, textarea, select) { background-color: #000 !important; color: #fff !important; border-color: #ff0 !important; }
        body.alto-contraste :where(input, textarea)::placeholder { color: #ddd !important; }
        body.alto-contraste img { filter: contrast(1.2) brightness(0.9); }
    </style>
</head>
<body class="bg-light text-gray-800 font-sans antialiased overflow-x-hidden">
    <div id="app"></div>

    <script>
        const T = {
            brand: { title: 'REINADO', local: 'Betim - MG' },
            nav: {
                items: [['#historia', 'A Festividade'], ['#ternos', 'Os Ternos'], ['#programacao', 'Programação 2026', 'nav-programacao-edicao'], ['#participantes', 'Participantes'], ['#contato', 'Fale Conosco']],
                withYear: 'Programação {ano}',
                cta: 'Ver Cronograma'
            },
            hero: {
                badge: 'Patrimônio Cultural Imaterial',
                title: 'Festa de Nossa Senhora do Rosário',
                desc: 'A maior expressão de fé, história e resistência da cultura afro-brasileira em Betim. Conheça os cantos, as cores e os tambores que cruzam gerações.',
                actions: [['#historia', 'Descobrir História', 'bg-white text-dark hover:bg-gray-100 shadow-lg'], ['#ternos', 'Conhecer as Guardas', 'border border-gray-500 text-white hover:bg-white/10']]
            },
            quick: [
                ['calendar-day', 'gold', 'border-gold', 'Calendário Oficial', 'Fique por dentro das datas de levantamento dos mastros, missas e procissões.'],
                ['map-location-dot', 'dark', 'border-dark', 'Rotas e Capelas', 'Veja os mapas dos cortejos, a localização da Capela do Rosário e os pontos de encontro.'],
                ['camera-retro', 'gold', 'border-gold', 'Acervo e Memória', 'Explore a galeria histórica, fotos antigas e depoimentos dos capitães dos ternos.']
            ],
            history: {
                badge: 'Tradição de Betim',
                title: 'Cultura Viva que Atravessa Gerações',
                text: [
                    'Celebrada há décadas, a Festa do Reinado de Betim reúne a comunidade em torno da devoção a Nossa Senhora do Rosário, São Benedito e Santa Efigênia. O som ritmado dos tambores e os passos marcados no chão batido expressam uma herança ancestral profunda.',
                    'Este espaço digital foi idealizado em conjunto com a comunidade para documentar e facilitar o acesso a essa rica história para turistas, pesquisadores e moradores da cidade.'
                ],
                img: 'https://live.staticflickr.com/7145/6745528079_a2dd02d7e9_h.jpg',
                alt: 'Igreja de Nossa Senhora do Rosário',
                caption: 'Igreja de Nossa Senhora do Rosário, Betim/MG'
            },
            guards: [
                { key: 'congo', color: 'text-blue-600', title: 'Congo', textTitle: 'Terno de Congo', category: 'Guarda', desc: 'Danças e cantos tradicionais.', textDesc: 'Conhecidos pelas roupas vibrantes e coreografias dinâmicas, representam a alegria do anúncio.', bg: 'from-blue-900 to-blue-700', img: 'assets/images/guarda-congo.jpg', alt: 'Guarda de Congado em cortejo com tambores e vestes festivas.' },
                { key: 'mocambique', color: 'text-amber-700', title: 'Moçambique', textTitle: 'Terno de Moçambique', category: 'Tradição', desc: 'Ritmos ancestrais e tradição.', textDesc: 'Ritmo cadenciado pelas gungas nos tornozelos, guardiões oficiais da coroa e dos altares.', bg: 'from-amber-900 to-amber-700', img: 'assets/images/terno-mocambique.jpg', alt: 'Terno de Moçambique em apresentação de Congada.' },
                { key: 'catupe', color: 'text-emerald-600', title: 'Catupé', textTitle: 'Terno de Catupé', category: 'Ritmo', desc: 'Cultura e musicalidade vibrante.', textDesc: 'Trazem instrumentos de sopro ou batidas diferenciadas, enriquecendo a harmonia sonora.', bg: 'from-emerald-900 to-emerald-700', img: 'assets/images/terno-catupe.jpg', alt: 'Catopês na Festa de Nossa Senhora do Rosário em Minas Gerais.' },
                { key: 'marujada', color: 'text-red-600', title: 'Marujada', textTitle: 'Marujada / Marinheiros', category: 'História', desc: 'Fé, procissões e tradição.', textDesc: 'Cantam as jornadas marítimas e a vinda da imagem protetora pelas águas.', bg: 'from-blue-900 to-blue-700', img: 'assets/images/marujada-marinheiros.jpg', alt: 'Marujos em cortejo tradicional com trajes de marinheiros.' }
            ],
            imageCredits: [
                ['Congo', 'Jonathan Jefferson', 'CC BY-SA 4.0', 'https://commons.wikimedia.org/wiki/File:Congado_Oliveira-MG_05.jpg'],
                ['Moçambique', 'Alberto Lefèvre', 'CC BY-SA 4.0', 'https://commons.wikimedia.org/wiki/File:Congada_Cia_de_Mo%C3%A7ambique_do_Parque_S%C3%A3o_Cristov%C3%A3o,_Taubat%C3%A9.jpg'],
                ['Catupé', 'Márcio L C', 'CC BY-SA 4.0', 'https://commons.wikimedia.org/wiki/File:Catop%C3%AAs.jpg'],
                ['Marujada', 'HVL', 'CC BY 3.0', 'https://commons.wikimedia.org/wiki/File:Marujos_dos_Cocais_durante_passagem_da_tocha_ol%C3%ADmpica_em_Coronel_Fabriciano_MG.JPG']
            ],
            edition: {
                badge: 'Área administrativa',
                title: 'Gestão da Edição',
                desc: 'Cadastre e selecione a edição anual do Reinado para manter a navegação do portal alinhada ao calendário vigente.',
                selected: 'Edição selecionada: {ano} · {tema}',
                empty: 'Nenhuma edição cadastrada.',
                saved: 'Dados salvos em <strong>localStorage</strong>',
                emptyList: 'Ainda não há edições cadastradas. Use o formulário para criar a primeira edição anual.',
                fields: [
                    ['ano', 'Ano', 'number', '2026', 'min="1900" max="2100" required'],
                    ['tema', 'Tema', 'text', 'Tema da edição', 'required'],
                    ['descricao', 'Descrição', 'textarea', 'Resumo da programação anual', 'required rows="3"'],
                    ['local', 'Local da celebração', 'text', 'Ex.: Praça, capela, rua ou propriedade particular', 'required'],
                    ['dataInicio', 'Data início', 'date', '', 'required'],
                    ['dataFim', 'Data fim', 'date', '', 'required'],
                    ['observacoes', 'Observações', 'textarea', 'Informações complementares', 'rows="2"']
                ],
                heads: ['Ano', 'Tema', 'Período', 'Local', 'Descrição', 'Observações', 'Ação'],
                action: { selected: 'Selecionada', select: 'Selecionar', remove: 'Excluir' }
            },
            people: {
                badge: 'Cadastro local',
                title: 'Participantes',
                desc: 'Registre participantes, grupos e funções vinculados a cada edição anual. Os dados ficam salvos apenas neste navegador.',
                saved: 'Lista salva em <strong>localStorage</strong> com a chave <strong>reinado_participantes</strong>.',
                emptyList: 'Ainda não há participantes cadastrados. Use o formulário para adicionar o primeiro registro.',
                types: [['visitante', 'Visitante'], ['morador', 'Morador'], ['capitão', 'Capitão'], ['guarda/terno', 'Guarda/Terno'], ['organizador', 'Organizador'], ['convidado', 'Convidado']],
                fields: [
                    ['nome', 'Nome do participante ou grupo', 'text', 'Ex.: Guarda de Moçambique', 'required'],
                    ['tipo', 'Tipo', 'select', 'Selecione', 'required'],
                    ['contato', 'Telefone ou contato opcional', 'text', 'Telefone, e-mail ou rede social', ''],
                    ['ano', 'Ano da edição vinculada', 'number', '2026', 'min="1900" max="2100" required'],
                    ['observacoes', 'Observações', 'textarea', 'Informações complementares', 'rows="3"']
                ],
                labels: { remove: 'Remover', year: 'Ano:', contact: 'Contato:', notes: 'Observações:', emptyContact: 'Não informado', emptyNotes: 'Sem observações' }
            },
            footer: {
                linksTitle: 'Links Úteis',
                links: [
                    ['Prefeitura de Betim', 'https://www.betim.mg.gov.br'],
                    ['Sec. Municipal de Arte e Cultura', 'https://www.betim.mg.gov.br/portal/secretarias/2/secretaria-municipal-de-cultura-secult'],
                    ['ODS 11 - Metas da ONU', 'https://brasil.un.org/pt-br/sdgs/11/key-activities']
                ],
                infoTitle: 'Informações',
                address: 'Praça Nossa Sra. do Rosário, 21-25 - Angola, Betim/MG',
                copyright: '&copy; 2026 · Patrimônio Cultural Imaterial da cidade de Betim.'
            }
        };

        const $ = (query) => document.querySelector(query);
        const esc = (value = '') => String(value).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
        const fill = (text, data) => Object.entries(data).reduce((out, [key, value]) => out.replace(`{${key}}`, value), text);
        const formatDate = (date) => date ? new Date(`${date}T00:00:00`).toLocaleDateString('pt-BR') : '';
        const inputClass = 'w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-gold focus:outline-none focus:ring-2 focus:ring-amber-100';
        const store = (key) => ({
            all: () => {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    return Array.isArray(data) ? data : [];
                } catch {
                    return [];
                }
            },
            save: (data) => localStorage.setItem(key, JSON.stringify(data))
        });

        function field(prefix, [name, label, type, placeholder, attrs]) {
            const id = `${prefix}-${name.replace(/[A-Z]/g, (letter) => `-${letter.toLowerCase()}`)}`;
            const control = type === 'textarea'
                ? `<textarea id="${id}" name="${name}" placeholder="${placeholder}" class="${inputClass}" ${attrs}></textarea>`
                : type === 'select'
                    ? `<select id="${id}" name="${name}" class="${inputClass}" ${attrs}><option value="">${placeholder}</option>${T.people.types.map(([value, label]) => `<option value="${value}">${label}</option>`).join('')}</select>`
                    : `<input id="${id}" name="${name}" type="${type}" placeholder="${placeholder}" class="${inputClass}" ${attrs}>`;

            return `<div><label for="${id}" class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-1">${label}</label>${control}</div>`;
        }

        const social = [
            ['instagram', 'https://www.instagram.com/prefeiturabetim/'],
            ['facebook', 'https://www.facebook.com/prefeituradebetim/'],
            ['youtube', 'https://www.youtube.com/user/PrefeituradeBetim']
        ];
        const guardCover = (guard) => `
            <div class="absolute inset-0 bg-gradient-to-br ${guard.bg}"></div>
            ${guard.img ? `<img src="${guard.img}" alt="${guard.alt}" class="relative z-10 w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy" onerror="this.style.display='none'">` : ''}
        `;
        const sectionIntro = (data) => `
            <div class="max-w-3xl mb-10">
                <span class="text-xs uppercase font-bold tracking-widest text-gold">${data.badge}</span>
                <h2 class="text-2xl md:text-3xl font-bold text-dark mt-2">${data.title}</h2>
                <p class="text-gray-600 text-sm mt-3 leading-relaxed">${data.desc}</p>
            </div>`;

        $('#app').innerHTML = `
            <div class="bg-gray-100 border-b border-gray-200 py-2 text-xs text-gray-600">
                <div class="container mx-auto px-4 flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <button id="btn-contraste" type="button" class="hover:text-gold" aria-pressed="false"><i class="fa-solid fa-circle-half-stroke mr-1"></i> Alto Contraste</button>
                        <button id="btn-fonte" type="button" class="hover:text-gold" aria-pressed="false"><i class="fa-solid fa-text-height mr-1"></i> Acessibilidade</button>
                    </div>
                    <div class="flex items-center space-x-3">${social.map(([icon, url]) => `<a href="${url}" aria-label="${icon}" class="hover:text-gold"><i class="fa-brands fa-${icon}"></i></a>`).join('')}</div>
                </div>
            </div>
            <header class="bg-white shadow-sm sticky top-0 z-50">
                <div class="container mx-auto px-4 py-4 flex justify-between items-center gap-3">
                    <div class="flex min-w-0 items-center space-x-3">
                        <div class="bg-dark text-white p-2 rounded-lg"><i class="fa-solid fa-crown text-xl text-amber-400"></i></div>
                        <div><h1 class="font-bold text-lg leading-tight tracking-tight text-dark">${T.brand.title}</h1><p class="text-xs text-gray-500 uppercase tracking-widest">${T.brand.local}</p></div>
                    </div>
                    <nav class="hidden md:flex space-x-8 font-medium text-sm text-gray-600">${T.nav.items.map(([href, label, id]) => `<a href="${href}" ${id ? `id="${id}"` : ''} class="hover:text-gold transition">${label}</a>`).join('')}</nav>
                    <a href="#programacao" class="shrink-0 bg-dark text-white px-3 sm:px-4 py-2 rounded-md text-[10px] sm:text-xs font-semibold hover:bg-gold transition uppercase tracking-wider">${T.nav.cta}</a>
                </div>
            </header>
            <section class="relative bg-dark text-white py-24 md:py-32 overflow-hidden">
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:16px_16px]"></div>
                <div class="container mx-auto px-4 relative z-10 text-center max-w-3xl">
                    <span class="bg-amber-500/20 text-amber-400 text-xs px-3 py-1 rounded-full font-semibold uppercase tracking-widest">${T.hero.badge}</span>
                    <h2 class="mx-auto max-w-2xl text-3xl sm:text-4xl md:text-5xl font-extrabold mt-4 tracking-tight">${T.hero.title}</h2>
                    <p class="mt-4 text-gray-300 text-base md:text-lg font-light leading-relaxed">${T.hero.desc}</p>
                    <div class="mt-8 flex justify-center space-x-4">${T.hero.actions.map(([href, label, cls]) => `<a href="${href}" class="${cls} px-6 py-3 rounded-md font-semibold text-sm transition">${label}</a>`).join('')}</div>
                </div>
            </section>
            <section class="container mx-auto px-4 -mt-10 relative z-20">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">${T.quick.map(([icon, color, border, title, desc]) => `
                    <div class="bg-white p-6 rounded-xl shadow-md border-t-4 ${border} flex items-start space-x-4">
                        <div class="text-${color} text-2xl mt-1"><i class="fa-solid fa-${icon}"></i></div>
                        <div><h3 class="font-bold text-dark text-base">${title}</h3><p class="text-gray-500 text-xs mt-1">${desc}</p></div>
                    </div>`).join('')}
                </div>
            </section>
            <section id="historia" class="container mx-auto px-4 py-20 max-w-5xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                    <div>
                        <h2 class="text-xs uppercase font-bold tracking-widest text-gold mb-2">${T.history.badge}</h2>
                        <h3 class="text-2xl md:text-3xl font-bold text-dark tracking-tight">${T.history.title}</h3>
                        ${T.history.text.map((text, index) => `<p class="text-gray-600 text-sm ${index ? 'mt-3' : 'mt-4'} leading-relaxed">${text}</p>`).join('')}
                    </div>
                    <div class="relative h-64 rounded-xl overflow-hidden shadow-inner">
                        <img src="${T.history.img}" alt="${T.history.alt}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/30"></div>
                        <div class="absolute bottom-0 left-0 w-full p-4"><p class="text-white text-sm font-semibold">${T.history.caption}</p></div>
                    </div>
                </div>
            </section>
            <section id="ternos" class="bg-gray-50 py-16 border-t border-b border-gray-200">
                <div class="container mx-auto px-4">
                    <div class="text-center max-w-xl mx-auto mb-12"><h2 class="text-2xl font-bold text-dark">Os Guardas e Ternos</h2><p class="text-gray-500 text-xs mt-2">Cada terno carrega suas próprias cores, instrumentos, ritmos e papéis fundamentais no cortejo.</p></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">${T.guards.map((guard) => `
                        <div class="relative h-72 rounded-2xl overflow-hidden shadow-lg group bg-gray-300">
                            ${guardCover(guard)}<div class="absolute inset-0 bg-black/40"></div>
                            <div class="absolute bottom-0 left-0 p-4"><h3 class="text-white text-lg font-bold">${guard.title}</h3><p class="text-white text-sm opacity-90">${guard.desc}</p></div>
                        </div>`).join('')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">${T.guards.map((guard) => `
                        <div class="bg-white rounded-lg p-5 shadow-sm border border-gray-100 hover:shadow-md transition">
                            <span class="text-xs font-bold ${guard.color} uppercase tracking-wider block mb-1">${guard.category}</span>
                            <h4 class="font-bold text-gray-900 text-base">${guard.textTitle}</h4>
                            <p class="text-gray-500 text-xs mt-2">${guard.textDesc}</p>
                        </div>`).join('')}
                    </div>
                    <p class="mt-8 text-center text-[11px] leading-relaxed text-gray-400">Imagens: ${T.imageCredits.map(([label, author, license, url]) => `<a href="${url}" target="_blank" rel="noopener" class="underline decoration-gray-300 underline-offset-2 hover:text-gray-600">${label} - ${author} (${license})</a>`).join(' · ')}</p>
                </div>
            </section>
            <section id="programacao" class="bg-white py-16 border-b border-gray-200">
                <div class="container mx-auto px-4">
                    ${sectionIntro(T.edition)}
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <form id="form-edicao" class="lg:col-span-1 bg-gray-50 rounded-2xl p-6 shadow-sm border border-gray-200 space-y-4">
                            ${T.edition.fields.slice(0, 4).map((item) => field('edicao', item)).join('')}
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">${T.edition.fields.slice(4, 6).map((item) => field('edicao', item)).join('')}</div>
                            ${field('edicao', T.edition.fields[6])}
                            <button type="submit" class="w-full bg-dark text-white rounded-lg px-4 py-3 text-xs font-bold uppercase tracking-wider hover:bg-gold transition">Cadastrar edição</button>
                        </form>
                        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                            <div class="p-6 border-b border-gray-200 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                <div><h3 class="font-bold text-dark text-lg">Edições cadastradas</h3><p id="edicao-selecionada" class="text-xs text-gray-500 mt-1"></p></div>
                                <span class="text-xs text-gray-500">${T.edition.saved}</span>
                            </div>
                            <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500"><tr>${T.edition.heads.map((head) => `<th class="px-4 py-3">${head}</th>`).join('')}</tr></thead><tbody id="lista-edicoes" class="divide-y divide-gray-100"></tbody></table></div>
                            <div id="lista-edicoes-vazia" class="hidden p-8 text-center text-sm text-gray-500">${T.edition.emptyList}</div>
                        </div>
                    </div>
                </div>
            </section>
            <section id="participantes" class="bg-gray-50 py-16 border-b border-gray-200">
                <div class="container mx-auto px-4">
                    ${sectionIntro(T.people)}
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <form id="form-participante" class="lg:col-span-1 bg-white rounded-2xl p-6 shadow-sm border border-gray-200 space-y-4">
                            ${T.people.fields.map((item) => field('participante', item)).join('')}
                            <button type="submit" class="w-full bg-dark text-white rounded-lg px-4 py-3 text-xs font-bold uppercase tracking-wider hover:bg-gold transition">Cadastrar participante</button>
                        </form>
                        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                            <div class="p-6 border-b border-gray-200"><h3 class="font-bold text-dark text-lg">Participantes cadastrados</h3><p class="text-xs text-gray-500 mt-1">${T.people.saved}</p></div>
                            <div id="lista-participantes" class="grid grid-cols-1 md:grid-cols-2 gap-4 p-6"></div>
                            <div id="lista-participantes-vazia" class="hidden p-8 text-center text-sm text-gray-500">${T.people.emptyList}</div>
                        </div>
                    </div>
                </div>
            </section>
            <footer id="contato" class="bg-dark text-gray-400 py-12 text-xs border-t-2 border-gold">
                <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div><h4 class="text-white font-bold mb-3 text-sm">${T.footer.linksTitle}</h4><ul class="space-y-2">${T.footer.links.map(([label, url]) => `<li><a href="${url}" target="_blank" rel="noopener" class="hover:text-white transition">${label}</a></li>`).join('')}</ul></div>
                    <div><h4 class="text-white font-bold mb-3 text-sm">${T.footer.infoTitle}</h4><p><i class="fa-solid fa-location-dot mr-2 text-gold"></i> ${T.footer.address}</p></div>
                    <div></div>
                </div>
                <div class="container mx-auto px-4 mt-8 pt-6 border-t border-gray-800 text-center text-gray-500">${T.footer.copyright}</div>
            </footer>`;

        const edicoes = store('reinado_edicoes');
        const participantes = store('reinado_participantes');

        function renderEdicoes() {
            const data = edicoes.all().sort((a, b) => Number(b.ano) - Number(a.ano));
            const selected = data.find((item) => item.selecionada) || data[0];
            $('#nav-programacao-edicao').textContent = selected ? fill(T.nav.withYear, selected) : T.nav.items[2][1];
            $('#edicao-selecionada').textContent = selected ? fill(T.edition.selected, selected) : T.edition.empty;
            $('#lista-edicoes-vazia').classList.toggle('hidden', data.length > 0);
            $('#lista-edicoes').innerHTML = data.map((item) => `
                <tr class="${item.selecionada ? 'bg-amber-50' : 'bg-white'}">
                    <td class="px-4 py-4 font-bold text-dark">${esc(item.ano)}</td>
                    <td class="px-4 py-4 text-gray-700">${esc(item.tema)}</td>
                    <td class="px-4 py-4 text-gray-600 whitespace-nowrap">${formatDate(item.dataInicio)} a ${formatDate(item.dataFim)}</td>
                    <td class="px-4 py-4 text-gray-600 max-w-xs">${esc(item.local)}</td>
                    <td class="px-4 py-4 text-gray-500 max-w-xs">${esc(item.descricao)}</td>
                    <td class="px-4 py-4 text-gray-500 max-w-xs">${esc(item.observacoes)}</td>
                    <td class="px-4 py-4">
                        <div class="flex flex-wrap gap-2">
                            <button type="button" data-ano="${esc(item.ano)}" class="selecionar-edicao rounded-md border border-gold px-3 py-2 text-xs font-bold uppercase tracking-wider text-gold hover:bg-gold hover:text-white transition">${item.selecionada ? T.edition.action.selected : T.edition.action.select}</button>
                            <button type="button" data-ano="${esc(item.ano)}" class="remover-edicao rounded-md border border-red-200 px-3 py-2 text-xs font-bold uppercase tracking-wider text-red-600 hover:bg-red-600 hover:text-white transition">${T.edition.action.remove}</button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        function renderParticipantes() {
            const typeLabel = Object.fromEntries(T.people.types);
            const data = participantes.all().sort((a, b) => Number(b.ano) - Number(a.ano));
            $('#lista-participantes-vazia').classList.toggle('hidden', data.length > 0);
            $('#lista-participantes').innerHTML = data.map((item) => `
                <article class="rounded-xl border border-gray-200 bg-gray-50 p-5 shadow-sm">
                    <div class="flex items-start justify-between gap-3">
                        <div><span class="inline-flex rounded-full bg-amber-100 px-3 py-1 text-[11px] font-bold uppercase tracking-wider text-gold">${esc(typeLabel[item.tipo] || item.tipo)}</span><h4 class="mt-3 text-base font-bold text-dark">${esc(item.nome)}</h4></div>
                        <button type="button" data-id="${esc(item.id)}" class="remover-participante rounded-md border border-red-200 px-3 py-2 text-xs font-bold uppercase tracking-wider text-red-600 hover:bg-red-600 hover:text-white transition">${T.people.labels.remove}</button>
                    </div>
                    <dl class="mt-4 space-y-2 text-sm text-gray-600">
                        <div><dt class="inline font-bold text-gray-700">${T.people.labels.year}</dt> <dd class="inline">${esc(item.ano)}</dd></div>
                        <div><dt class="inline font-bold text-gray-700">${T.people.labels.contact}</dt> <dd class="inline">${esc(item.contato || T.people.labels.emptyContact)}</dd></div>
                        <div><dt class="block font-bold text-gray-700">${T.people.labels.notes}</dt><dd class="mt-1 text-gray-500">${esc(item.observacoes || T.people.labels.emptyNotes)}</dd></div>
                    </dl>
                </article>`).join('');
        }

        $('#form-edicao').addEventListener('submit', (event) => {
            event.preventDefault();
            const next = { ...Object.fromEntries(new FormData(event.currentTarget)), selecionada: true };
            edicoes.save([...edicoes.all().filter((item) => String(item.ano) !== String(next.ano)).map((item) => ({ ...item, selecionada: false })), next]);
            event.currentTarget.reset();
            renderEdicoes();
        });

        $('#lista-edicoes').addEventListener('click', (event) => {
            const selectButton = event.target.closest('.selecionar-edicao');
            const removeButton = event.target.closest('.remover-edicao');

            if (selectButton) {
                edicoes.save(edicoes.all().map((item) => ({ ...item, selecionada: String(item.ano) === String(selectButton.dataset.ano) })));
            }

            if (removeButton) {
                const remaining = edicoes.all().filter((item) => String(item.ano) !== String(removeButton.dataset.ano));
                if (remaining.length && !remaining.some((item) => item.selecionada)) remaining[0].selecionada = true;
                edicoes.save(remaining);
            }

            if (!selectButton && !removeButton) return;
            renderEdicoes();
        });

        $('#form-participante').addEventListener('submit', (event) => {
            event.preventDefault();
            participantes.save([...participantes.all(), { id: String(Date.now()), ...Object.fromEntries(new FormData(event.currentTarget)) }]);
            event.currentTarget.reset();
            renderParticipantes();
        });

        $('#lista-participantes').addEventListener('click', (event) => {
            const button = event.target.closest('.remover-participante');
            if (!button) return;
            participantes.save(participantes.all().filter((item) => String(item.id) !== String(button.dataset.id)));
            renderParticipantes();
        });

        function applyPrefs() {
            [['alto-contraste', 'reinado_alto_contraste', '#btn-contraste'], ['fonte-ampliada', 'reinado_fonte_ampliada', '#btn-fonte']].forEach(([className, key, button]) => {
                const active = localStorage.getItem(key) === 'true';
                document.body.classList.toggle(className, active);
                $(button).setAttribute('aria-pressed', String(active));
            });
            document.documentElement.style.fontSize = document.body.classList.contains('fonte-ampliada') ? '112.5%' : '';
        }

        [['alto-contraste', 'reinado_alto_contraste', '#btn-contraste'], ['fonte-ampliada', 'reinado_fonte_ampliada', '#btn-fonte']].forEach(([className, key, button]) => {
            $(button).addEventListener('click', () => {
                localStorage.setItem(key, String(!document.body.classList.contains(className)));
                applyPrefs();
            });
        });

        applyPrefs();
        renderEdicoes();
        renderParticipantes();
    </script>
</body>
</html>
